name: HealthInsights
options:
  bundleIdPrefix: com.marklilburn
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    # Simulator builds need no signing identity or paid account
    CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]: "NO"

targets:
  HealthInsights:
    type: application
    platform: iOS
    sources: [HealthInsights]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.marklilburn.healthinsights
    entitlements:
      path: HealthInsights/HealthInsights.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
        com.apple.security.application-groups:
          - group.com.marklilburn.healthinsights
    info:
      path: HealthInsights/Info.plist
      properties:
        CFBundleDisplayName: Health Insights
        UILaunchScreen: {}
        NSHealthShareUsageDescription: >-
          Health Insights reads your heart rate variability and resting heart
          rate to calculate a daily recovery readiness score. Data never
          leaves your device.
        BGTaskSchedulerPermittedIdentifiers:
          - com.marklilburn.healthinsights.refresh
        UIBackgroundModes:
          - processing
    dependencies:
      - target: ReadinessWidget
        embed: true

  ReadinessWidget:
    type: app-extension
    platform: iOS
    sources: [ReadinessWidget]
    entitlements:
      path: ReadinessWidget/ReadinessWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.marklilburn.healthinsights
    info:
      path: ReadinessWidget/Info.plist
      properties:
        CFBundleDisplayName: Readiness
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.marklilburn.healthinsights.widget
